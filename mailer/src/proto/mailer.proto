// Basics
syntax = "proto3";
package mailer;

// Services
service MailerService {
  rpc sendMail (SendMailReq) returns (SendMailRes);
}

// Messages
message Attach {
  string filename = 1;
  bytes content = 2;
}

// sendMail
message SendMailReq {
  repeated string targets = 1;
  repeated string ccs = 2;
  string subject = 3;
  string body = 4;
  repeated Attach attachs = 5;
}
message SendMailRes {
  string status = 1;
}

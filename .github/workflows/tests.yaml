name: "Unit Tests"

on:
  pull_request:
    branches: [ develop ]
  push:
    branches: [ master ]

jobs:
  run-unit-tests:
    strategy:
      fail-fast: true
      matrix:
        os: [ ubuntu-22.04 ]
        node-version: [ 19 ]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run unit tests
        run: cd mailer; yarn run dev:tests
